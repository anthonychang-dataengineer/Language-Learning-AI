<!DOCTYPE html>
<html>
    <head>
        <title>Translation Practice</title>
        <style>
             body {
                font-family: Arial, sans-serif;
                max-width: 600px;
                margin: 50px auto;
                padding: 20px;
            }
            textarea {
                width: 100%;
                height: 50px;
                font-size: 16px;
                padding: 10px;
                border: 1px solid #ccc;
            }
            button {
                padding: 10px 20px;
                font-size: 16px;
                cursor: pointer;
            }
            #results {
                white-space: pre-wrap;
                background-color: #f0f0f0;
            }
        </style>
    </head>
        <body>

            <div id="sentence">
                <p>Learning Word(s):<span id="stretchWords"></span></p>
                <p>Translate this sentence:</p>
                <p><span id="sentenceText"></span></p>
                <p><span id="sentencePinyin"></span></p>
            </div>


            <textarea id="input" placeholder="Your translation"></textarea>
            <button id="submitButton" onclick="submit()">Submit</button>
            <div id="resultBubble" style="display:none;">          
                <h3>Results</h3>
                <table id="resultTable"></table>
                <div id="commentarySection"></div>
                <button onclick="nextLesson()">Next Lesson</button>
            </div> 
            
            <script>
                async function getSentence() {
                    const res = await fetch('http://localhost:3000/sentence');
                    const data = await res.json();
                    displaySentence(data);
   
                }

                function displaySentence(sentenceData){
                    document.getElementById('sentenceText').innerText = sentenceData.sentence;
                    document.getElementById('sentencePinyin').innerText = sentenceData.pinyin;
                    document.getElementById('input').value = '';//resets input box. redundant for first time, but its needed for second iteration
                    document.getElementById('resultBubble').style.display = 'none';//resets result bubble display to none. 
                    document.getElementById('submitButton').disabled = false;

                    const stretchWordsRow = `<tr><td>${sentenceData.stretchWords.map(item => item.word).join(", ")}</td></tr>`;//displays the stretch word(s)
                    document.getElementById('stretchWords').innerHTML = stretchWordsRow;


                }

                async function submit() {
                    const userAttempt = document.getElementById('input').value;
                    const res = await fetch('http://localhost:3000/grade', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({userAttempt})
                    });
                    const data = await res.json();
                    document.getElementById('resultBubble').style.display = 'block';
                
                        let tableHTML = '';
                        data.wordItems.forEach(item => {
                            tableHTML += `
                                <tr>
                                    <td>${item.word}: </td>
                                    <td>${item.grade.toFixed(2)}</td>
                                </tr>
                            `;
                        });
                    document.getElementById('resultTable').innerHTML = tableHTML;
                    document.getElementById('commentarySection').innerText = data.commentary;
                    document.getElementById('submitButton').disabled = true;//turns Submit button unusable
                    // Store the next sentence data for when they click "Next Lesson"
                    window.nextSentenceData = data.nextSentence;//remember, the data thats returned includes words, commentary AND next sentence

                }

                async function nextLesson(){//when you click this, it calls the displaySentence function and then input resets
                    //displaySentence(window.nextSentenceData)//click this and it should just trigger generate new sentence again?
                    getSentence()
                }
                getSentence();

            </script>
        </body>

</html>
